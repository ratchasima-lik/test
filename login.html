<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Smart Locker</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif; /* ใช้ฟอนต์ Sarabun */
            margin: 0;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            display: flex;
            width: 90%;
            max-width: 950px; /* ขยายขนาดคอนเทนเนอร์ */
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            overflow: hidden; /* เพื่อให้มุมโค้งแสดงผลถูกต้อง */
            flex-direction: column; /* สำหรับมือถือ: ซ้อนกัน */
        }

        /* สำหรับหน้าจอเดสก์ท็อปและแท็บเล็ต (>= 768px) */
        @media (min-width: 768px) {
            .main-container {
                flex-direction: row; /* จัดวางเคียงข้างกัน */
            }
        }

        .image-panel {
            flex: 1; /* ใช้พื้นที่ครึ่งหนึ่ง */
            background-color: #007bff; /* สีสำรองกรณีรูปไม่โหลด */
            position: relative;
        }

        .login-image {
            width: 100%;
            height: 100%;
            object-fit: cover; /* จัดการขนาดรูปโดยไม่บิดเบือน */
            display: block;
        }

        /* เพิ่ม Overlay บางๆ เพื่อให้ภาพดูนุ่มนวลและเป็นมืออาชีพ */
        .image-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0,123,255,0.1) 0%, rgba(10,53,103,0.3) 100%);
        }

        .form-panel {
            flex: 1; /* ใช้พื้นที่ครึ่งหนึ่ง */
            padding: 60px 40px; /* เพิ่มระยะห่างภายใน */
            display: flex;
            flex-direction: column;
            justify-content: center; /* จัดให้อยู่กึ่งกลางแนวตั้ง */
        }

        h2 {
            font-size: 2rem;
            color: #333;
            margin-top: 0;
            margin-bottom: 0.5rem;
            text-align: left; /* จัดชิดซ้าย */
        }

        .subtitle {
            color: #666;
            margin-bottom: 2.5rem;
            text-align: left;
        }

        /* ปรับปรุงสไตล์อินพุต */
        input {
            margin-bottom: 1.25rem; /* เพิ่มระยะห่างระหว่างฟิลด์ */
            padding: 15px;
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.1); /* เพิ่มเอฟเฟกต์ Glow */
        }

        /* ปรับปรุงสไตล์ปุ่ม */
        button {
            padding: 15px;
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%); /* เพิ่ม Gradient */
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            font-weight: bold;
            transition: background 0.3s ease, transform 0.1s ease;
            margin-top: 1rem;
        }

        button:hover {
            background: linear-gradient(135deg, #0056b3 0%, #004494 100%);
        }

        button:active {
            transform: translateY(1px); /* เพิ่มเอฟเฟกต์การกดปุ่ม */
        }

        /* ปรับปรุงสไตล์ข้อความ Error */
        .error-message {
            background-color: #fff3f3;
            color: #d8000c;
            border: 1px solid #f99;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            text-align: left;
        }

        /* ปรับปรุง Responsive สำหรับฟอร์มบนมือถือ */
        @media (max-width: 767px) {
            .form-panel {
                padding: 40px 20px;
            }
            h2 { font-size: 1.7rem; }
            .subtitle { font-size: 0.9rem; margin-bottom: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="image-panel">
            <img src="{{ url_for('static', filename='img/bg-login.jpg') }}" alt="AI Smart Locker" class="login-image">
            <div class="image-overlay"></div>
        </div>
        <div class="form-panel">
            <h2>เข้าสู่ระบบ Smart Locker</h2>
            <p class="subtitle">ล็อกอินเพื่อเข้าสู่ระบบและเริ่มใช้งาน</p>
            
            {% if error %}
                <div class="error-message">{{ error }}</div>
            {% endif %}
            
            <form method="POST" action="/login">
                <input type="text" name="login_id" placeholder="รหัสผู้ใช้ หรือ Username" required>
                <input type="password" name="password" placeholder="รหัสผ่าน" required>
                <button type="submit">ล็อกอิน</button>
            </form>
        </div>
    </div>
</body>
</html>

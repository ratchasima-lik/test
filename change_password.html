<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เปลี่ยนรหัสผ่าน</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 90%; max-width: 350px; box-sizing: border-box; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px;}
        .btn { width: 48%; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; box-sizing: border-box;}
    </style>
</head>
<body>
    <div class="box">
        <h2 style="margin-top: 0; text-align: center;">เปลี่ยนรหัสผ่าน</h2>
        {% if error %}<p style="color: red; text-align: center;">{{ error }}</p>{% endif %}
        {% if success %}<p style="color: green; text-align: center;">{{ success }}</p>{% endif %}
        
        <form method="POST">
            <input type="password" name="old_password" placeholder="รหัสผ่านเก่า" required>
            <input type="password" name="new_password" placeholder="รหัสผ่านใหม่" required>
            <input type="password" name="conf_password" placeholder="ยืนยันรหัสผ่านใหม่" required>
            <div style="display: flex; justify-content: space-between; margin-top: 15px;">
                <button type="button" class="btn" style="background: #ccc; color: black;" onclick="window.location.href='/'">ยกเลิก</button>
                <button type="submit" class="btn" style="background: #007bff; color: white;">ยืนยัน</button>
            </div>
        </form>
    </div>
</body>
</html>

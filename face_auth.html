<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกใบหน้า - AI Smart Locker</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background: #0f172a; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box;
        } 
        
        .box { 
            background: #1e293b; 
            padding: 40px; 
            border-radius: 20px; 
            text-align: center; 
            width: 100%; 
            max-width: 750px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            box-sizing: border-box;
            display: flex;
            flex-direction: column; /* จัดเรียงจากบนลงล่าง */
        } 

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header-bar h2 { margin: 0; font-size: 1.8rem; }

        .back-btn {
            color: #94a3b8;
            text-decoration: none;
            font-size: 16px;
            background: rgba(255,255,255,0.1);
            padding: 10px 15px;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); color: white;}

        /* กรอบกล้องปกติบน PC */
        .camera-container {
            width: 100%;
            aspect-ratio: 4/3; /* แนวนอน 4:3 สำหรับคอมพิวเตอร์ */
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 30px;
            border: 2px solid #334155;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        video, canvas { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
            transform: scaleX(-1); /* สลับซ้ายขวาให้เหมือนส่องกระจก */
        }
        
        /* ปุ่มชัตเตอร์กล้องตรงกลาง */
        .capture-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            padding-top: 10px;
        }

        .capture-btn { 
            background: #ef4444; 
            color: white; 
            border: 5px solid #1e293b; 
            box-shadow: 0 0 0 4px #ef4444; 
            border-radius: 50%; 
            width: 85px; 
            height: 85px; 
            cursor: pointer; 
            font-size: 32px; 
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s, background 0.3s; 
        }
        .capture-btn:hover { transform: scale(1.05); background: #dc2626; }
        .capture-btn:active { transform: scale(0.95); }

        /* ส่วนฟอร์มรหัสผ่าน */
        input[type="password"] { 
            width: 100%; 
            padding: 18px; 
            margin: 10px 0 25px; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 18px; 
            border: 2px solid #475569; 
            background: #0f172a;
            color: white;
            text-align: center;
            transition: border-color 0.3s;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .action-btn-group { display: flex; gap: 20px; }

        .btn-save, .btn-retry { 
            flex: 1; 
            padding: 18px; 
            border-radius: 10px; 
            border: none; 
            cursor: pointer; 
            font-size: 18px; 
            font-weight: bold; 
            color: white;
            transition: background 0.3s, transform 0.2s;
        }
        .btn-save { background: #22c55e; }
        .btn-save:hover { background: #16a34a; transform: translateY(-2px); }
        .btn-retry { background: #64748b; text-decoration: none; }
        .btn-retry:hover { background: #475569; transform: translateY(-2px); }

        /* 📱 โหมดมือถือ: เปลี่ยนให้แอปกล้องเต็มจอเหมือน iPhone */
        @media (max-width: 768px) {
            body { 
                padding: 0; /* เอาขอบรอบๆ ออก */
                background: #000; /* พื้นหลังดำสนิท */
            }
            .box { 
                padding: 20px; 
                border-radius: 0; /* ให้กล่องเหลี่ยมชิดขอบจอ */
                min-height: 100vh; /* ให้กล่องยาวเต็ม 100% ของจอมือถือ */
                background: #1e293b;
            }
            .header-bar h2 { font-size: 1.4rem; }
            
            /* 🌟 เวทมนตร์อยู่ตรงนี้: ยืดกล้องให้เต็มจอ */
            .camera-container {
                aspect-ratio: auto; /* เลิกบังคับเป็น 4:3 */
                flex-grow: 1; /* สั่งให้ยืดกินพื้นที่ว่างตรงกลางจอให้หมด */
                border-radius: 12px;
                margin-bottom: 20px;
            }

            .capture-btn { width: 75px; height: 75px; font-size: 26px; border-width: 4px; }
            input[type="password"], .btn-save, .btn-retry { padding: 15px; font-size: 16px; }
            .action-btn-group { gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="header-bar">
            <a href="/" class="back-btn">⬅ กลับ</a>
            <h2>📷 สแกนใบหน้า</h2>
            <div style="width: 60px;"></div>
        </div>
        
        <div class="camera-container">
            <video id="videoElement" autoplay playsinline></video>
            <canvas id="canvasElement" style="display:none;"></canvas>
        </div>
        
        <div id="initialBtnGroup" class="capture-wrapper">
            <button type="button" id="capBtn" class="capture-btn" onclick="captureFace()" title="ถ่ายภาพ">📸</button>
        </div>

        <form method="POST" id="faceForm">
            <input type="hidden" name="image_data" id="imageData">
            <div id="pwSection" style="display:none;">
                <p style="color: #cbd5e1; margin-bottom: 5px; font-size: 16px;">กรุณาใส่รหัสผ่านเพื่อยืนยันตัวตน</p>
                <input type="password" name="password" id="pwInput" placeholder="รหัสผ่านของคุณ" required>
                
                <div class="action-btn-group">
                    <button type="button" class="btn-retry" onclick="location.reload()">🔄 ถ่ายใหม่</button>
                    <button type="submit" class="btn-save">💾 บันทึกรูป</button>
                </div>
            </div>
        </form>
    </div>
    
    <script>
        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvasElement');
        
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => { 
            video.srcObject = stream; 
        })
        .catch(err => { 
            alert("ไม่สามารถเปิดกล้องได้ (ต้องเข้าผ่าน HTTPS หรือเลข IP): " + err); 
        });

        function captureFace() {
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            
            // พลิกภาพกลับตอนถ่ายให้ตรงกับความจริง (ถ้าไม่พลิก ภาพที่เซฟจะกลับซ้ายขวา)
            let ctx = canvas.getContext('2d');
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            document.getElementById('imageData').value = canvas.toDataURL('image/jpeg');
            
            video.style.display = 'none'; 
            document.getElementById('initialBtnGroup').style.display = 'none';
            canvas.style.display = 'block'; 
            document.getElementById('pwSection').style.display = 'block';
        }
    </script>
</body>
</html>

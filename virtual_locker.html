<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Smart Locker</title>
    <style>
        body { font-family: sans-serif; background-color: #2c3e50; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; color: white; box-sizing: border-box;}
        .header-bar { width: 100%; display:flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;}
        .locker-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 15px; margin-top: 20px; width: 100%; max-width: 800px; }
        .locker-box { background: #34495e; padding: 20px 5px; border-radius: 10px; text-align: center; border: 3px solid; cursor: pointer; width: 100%; box-sizing: border-box;}
        .available { border-color: #2ecc71; } .occupied { border-color: #e74c3c; } .offline { border-color: #95a5a6; opacity: 0.6; }
        
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); overflow-y: auto; padding: 20px; box-sizing: border-box;}
        .modal-content { background-color: #ecf0f1; margin: 5% auto; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; color: black; box-sizing: border-box; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .key-btn { padding: 15px 5px; font-size: 20px; border-radius: 5px; cursor: pointer; border: 1px solid #bdc3c7; background: white; width: 100%; box-sizing: border-box;}
        
        .action-toggle { width: 48%; padding: 15px 5px; border: 2px solid #ccc; background: white; cursor: pointer; font-weight: bold; border-radius: 5px; color: gray; font-size: 14px; box-sizing: border-box;}
        .action-toggle.active { background: #3498db; color: white; border-color: #2980b9; }
        
        #cameraView { width: 100%; height: 200px; background: black; border-radius: 8px; margin-bottom: 10px; object-fit: cover;}
    </style>
</head>
<body>
    <div class="header-bar">
        <h2 style="margin:0;">📱 หน้าจอเลือกล็อกเกอร์จำลอง</h2>
        <a href="/" style="color: white; text-decoration: none; border: 1px solid white; padding: 8px 15px; border-radius: 20px;">กลับหน้า Dashboard</a>
    </div>

    <div class="locker-grid">
        {% for locker in lockers %}
        <div class="locker-box {{ locker.status.lower() }}" onclick="openTerminal('{{ locker.locker_id }}', '{{ locker.status }}')">
            <h1 style="margin: 0;">{{ locker.locker_id }}</h1>
            <small>{{ locker.status }}</small>
        </div>
        {% endfor %}
    </div>

    <div id="terminalModal" class="modal">
        <div class="modal-content">
            <h2 id="terminalTitle" style="margin-top:0;">ตู้หมายเลข: </h2>
            <video id="cameraView" autoplay playsinline></video>
            <canvas id="capCanvas" style="display:none;"></canvas>

            <div id="msgDisplay" style="background: black; color: #2ecc71; padding: 10px; font-family: monospace; border-radius: 5px; margin-bottom: 10px; word-break: break-all;">พร้อมใช้งาน</div>
            
            <div id="actionSelection" style="display: none; justify-content: space-between; margin-bottom: 15px;">
                <button id="btnContinue" class="action-toggle active" onclick="selectAction('continue')">🔓 เปิดใช้ต่อ</button>
                <button id="btnFinish" class="action-toggle" onclick="selectAction('finish')">🛑 คืนตู้</button>
            </div>

            <input type="password" id="pinInput" placeholder="รหัส PIN" readonly style="width: 100%; padding: 10px; font-size: 24px; text-align: center; letter-spacing: 5px; box-sizing: border-box; border-radius:5px; border:1px solid #ccc;">
            
            <div class="keypad">
                <button class="key-btn" onclick="press('1')">1</button><button class="key-btn" onclick="press('2')">2</button><button class="key-btn" onclick="press('3')">3</button>
                <button class="key-btn" onclick="press('4')">4</button><button class="key-btn" onclick="press('5')">5</button><button class="key-btn" onclick="press('6')">6</button>
                <button class="key-btn" onclick="press('7')">7</button><button class="key-btn" onclick="press('8')">8</button><button class="key-btn" onclick="press('9')">9</button>
                <button class="key-btn" style="background:#e74c3c; color:white;" onclick="clearPin()">CLR</button>
                <button class="key-btn" onclick="press('0')">0</button>
                <button class="key-btn" style="background:#2ecc71; color:white;" onclick="submitAction('PIN')">OK</button>
            </div>
            
            <div style="display:flex; justify-content:space-between; margin-top:10px;">
                <button style="width:48%; padding: 12px; background:#95a5a6; color:white; border:none; border-radius:5px; font-weight:bold;" onclick="closeTerminal()">ปิด</button>
                <button style="width:48%; padding: 12px; background:#3498db; color:white; border:none; border-radius:5px; font-weight:bold;" onclick="submitAction('FACE')">📷 สแกนหน้า</button>
            </div>
        </div>
    </div>

    <script>
        let currentLocker = ""; let currentPin = ""; let selectedMode = "start";
        const video = document.getElementById('cameraView');
        const canvas = document.getElementById('capCanvas');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => { video.srcObject = stream; })
        .catch(err => { console.log("Camera Error:", err); });
        
        function openTerminal(id, status) {
            // 🌟 เพิ่มเงื่อนไขเช็ก Offline: ถ้าตู้ Offline ให้แจ้งเตือนแล้วจบการทำงานทันที
            if(status.toLowerCase() === 'offline') {
                alert("❌ ตู้หมายเลข " + id + " อยู่ในสถานะ Offline (ปิดปรับปรุง) ไม่สามารถใช้งานได้ในขณะนี้");
                return; 
            }

            currentLocker = id; clearPin();
            document.getElementById('terminalTitle').innerText = 'ตู้หมายเลข: ' + id;
            if(status === 'Occupied') {
                document.getElementById('msgDisplay').innerText = "ตู้นี้มีผู้ใช้งานอยู่ (กรอก PIN หรือสแกนหน้าเจ้าของตู้)";
                document.getElementById('actionSelection').style.display = 'flex';
                selectAction('continue'); 
            } else {
                document.getElementById('msgDisplay').innerText = "ตู้ว่าง (กรอก PIN หรือ สแกนหน้าเพื่อใช้)";
                document.getElementById('actionSelection').style.display = 'none';
                selectedMode = 'start';
            }
            document.getElementById('terminalModal').style.display = 'block';
        }

        function closeTerminal() { document.getElementById('terminalModal').style.display = 'none'; }
        function press(num) { currentPin += num; document.getElementById('pinInput').value = '*'.repeat(currentPin.length); }
        function clearPin() { currentPin = ""; document.getElementById('pinInput').value = ""; }

        function selectAction(mode) {
            selectedMode = mode;
            document.getElementById('btnContinue').classList.toggle('active', mode === 'continue');
            document.getElementById('btnFinish').classList.toggle('active', mode === 'finish');
        }
        
        function submitAction(method) {
            let payload = { locker_id: currentLocker, pin: currentPin, action: selectedMode, method: method };

            if(method === 'FACE') {
                document.getElementById('msgDisplay').innerText = "กำลังใช้ AI วิเคราะห์ใบหน้า...";
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                payload.image_data = canvas.toDataURL('image/jpeg');
            } else {
                if(currentPin === "") return;
                document.getElementById('msgDisplay').innerText = "กำลังตรวจสอบ PIN...";
            }

            fetch('/api/locker_action', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(res => res.json()).then(data => {
                document.getElementById('msgDisplay').innerText = data.msg;
                document.getElementById('msgDisplay').style.color = data.status === 'error' ? "#e74c3c" : "#2ecc71";
                if(data.status !== 'error') setTimeout(() => window.location.reload(), 2000);
            });
        }
    </script>
</body>
</html>
